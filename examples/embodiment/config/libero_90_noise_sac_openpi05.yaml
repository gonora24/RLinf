defaults:
  - env/libero_90@env.train
  - env/libero_90@env.eval
  - model/noise_policy_openpi@actor.model
  - training_backend/fsdp@actor.fsdp_config
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:EMBODIED_PATH}/config/

cluster:
  num_nodes: 1
  component_placement:
    actor,env,rollout: all

runner:
  task_type: embodied
  logger:
    log_path: "../results"
    project_name: rlinf
    experiment_name: "libero_90_noise_sac_openpi05"
    logger_backends: ["wandb"] # wandb, swanlab

  max_epochs: 1000
  max_steps: -1

  only_eval: False
  val_check_interval: -1
  save_interval: 20

  resume_dir: null # Optional: path to a saved checkpoint directory, such as 'checkpoints/global_step_10'. If not None, it will be used to resume training.
  ckpt_path: null 

algorithm:
  loss_type: noise_sac
  tau: 0.005 # soft update coefficient for target networks
  gamma: 0.999 # discount factor for future rewards
  group_size: 1
  agg_q: min
  adv_type: noise_policy_openpi # does not matter for noise policy so just put anything here
  reward_coef: 1.0 # scale up step reward by this factor
  rollout_epoch: 4
  eval_rollout_epoch: 1 # set eval_rollout_epoch > 0 when enable runner.only_eval or runner.val_check_interval > 0
  entropy_tuning:
    target_entropy: -16 # target entropy for entropy tuning -d/2 -> 32/2 = 16
    optim:
      lr: 1.0e-4
      adam_beta1: 0.9
      adam_beta2: 0.95
      adam_eps: 1.0e-08
      clip_grad: 1.0
      weight_decay: 0.01
  # params for generation (copied)
  sampling_params:
    do_sample: True
    temperature_train: 1.0
    temperature_eval: 0.6
    top_k: 50
    top_p: 1.0
    repetition_penalty: 1.0
    add_BOS: False

  # length argument for autoregressive sampling (copied)
  # max length means max amount of tokens to generate
  length_params:
    max_new_token: null
    max_length: 1024
    min_length: 1

  replay_buffer:
    enable_cache: True
    cache_size: 100 # changed due to memory error
    sample_window_size: 100
    min_buffer_size: 2 #1 changed for debugging

env:
  group_name: "EnvGroup"
  enable_offload: False

  train:
    total_num_envs: 8
    max_episode_steps: 400 #480 # max episode steps for truncation
    max_steps_per_rollout_epoch: 400 #480 #400 aus dsrl code
    # specific_reset_id: 2850  # Use this for reset_state_id (spans all tasks/trials)
    specific_task_id: 57      # Use this for direct task_id specification
    reward_coef: ${algorithm.reward_coef}
    group_size: ${algorithm.group_size}
  eval:
    total_num_envs: 32
    auto_reset: True
    ignore_terminations: True
    max_episode_steps: 400 #480
    max_steps_per_rollout_epoch: 400 #480
    # specific_reset_id: 2850  # Use this for reset_state_id (spans all tasks/trials)
    specific_task_id: 57      # Use this for direct task_id specification
    group_size: 1
    use_fixed_reset_state_ids: True
    is_eval: True
    video_cfg:
      save_video: True
      video_base_dir: ${runner.logger.log_path}/video/eval

rollout:
  group_name: "RolloutGroup"
  backend: "huggingface"
  enable_offload: False
  pipeline_stage_num: 1

  collect_transitions: True
  collect_prev_infos: False

  model:
    model_path: "./RLinf-Pi05-LIBERO-SFT"
    precision: ${actor.model.precision}
    openpi:
      use_dsrl_sac: True

actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"
  micro_batch_size: 256
  global_batch_size: 2048 # maximum : global batch size = micro batch size * actor num_processes.
  seed: 42
  enable_offload: False

  # Override the default values in model/pi0_5
  model:
    model_path: "./RLinf-Pi05-LIBERO-SFT"
    model_type: "noise_policy_openpi"
    num_steps: 10
    num_q_heads: 10
    use_dsrl_sac: True

  optim:
    lr: 1.0e-4
    adam_beta1: 0.9
    adam_beta2: 0.95
    adam_eps: 1.0e-08
    clip_grad: 1.0
    weight_decay: 0.01

  critic_optim:
    lr: 3.0e-4
    clip_grad: 1.0

  # Override the default values in training_backend/fsdp
  fsdp_config:
    strategy: "fsdp"
    sharding_strategy: "no_shard"
    gradient_checkpointing: False # for openpi, gradient checkpointing is not supported, please do not change this value
    mixed_precision:
      param_dtype: ${actor.model.precision}
      reduce_dtype: ${actor.model.precision}
      buffer_dtype: ${actor.model.precision}
    
reward:
  use_reward_model: False

critic:
  use_critic_model: False
defaults:
  - env/metaworld_50@env.train
  - env/metaworld_50@env.eval
  - model/pi0@actor.model
  - training_backend/fsdp@actor.fsdp_config
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:EMBODIED_PATH}/config/

cluster:
  num_nodes: 1
  component_placement:
    actor,env,rollout: all

runner:
  task_type: embodied
  logger:
    log_path: "../results"
    project_name: rlinf
    experiment_name: "metaworld_50_task2trial0_pi0_toperlcritic_qchk_dsrlloss" #"metaworld_50_ppo_openpi_pi05"
    logger_backends: ["wandb"] # wandb, swanlab

  max_epochs: 10000
  max_steps: -1

  only_eval: False # False
  val_check_interval: -1
  save_interval: -1 #60

  resume_dir: null # Optional: path to a saved checkpoint directory, such as 'checkpoints/global_step_10'. If not None, it will be used to resume training.
  ckpt_path: null  # Optional: path to a .pt checkpoint. If not None, it will be loaded after the model is instantiated (for evaluation).

algorithm:
  normalize_advantages: False
  kl_penalty: kl  # how to estimate kl divergence: kl or kl_penalty
  group_size: 1
  reward_coef: 1.0

  rollout_epoch: 1
  eval_rollout_epoch: 2 # set eval_rollout_epoch > 0 when enable runner.only_eval or runner.val_check_interval > 0

  reward_type: chunk_level
  logprob_type: chunk_level
  entropy_type: token_level
  chunk_reward: False
  use_intra_chunking: False

  update_epoch: 200 #0
  adv_type: embodied_sac
  loss_type: embodied_sac
  loss_agg_func: "token-mean" 

  agg_q: min
  actor_agg_q: min
  backup_entropy: False
  critic_subsample_size: 0
  critic_actor_ratio: 2 #1

  bootstrap_type: standard
  gamma: 0.999
  tau: 0.005

  entropy_tuning:
    alpha_type: softplus
    initial_alpha: 1.0
    target_entropy: -16
    optim:
      lr: 3.0e-4
      lr_scheduler: torch_constant
      clip_grad: 10.0

  replay_buffer:
    enable_cache: True
    enable_preload: True
    cache_size: 100 #15000
    sample_window_size: 100 #15000
    min_buffer_size: 3 #10
    auto_save: False

  target_update_freq: 1
  target_update_type: all
  train_actor_steps: 3

  filter_rewards: False
  rewards_lower_bound: 0.1
  rewards_upper_bound: 0.9

  # params for generation
  sampling_params:
    do_sample: True
    temperature_train: 1.0
    temperature_eval: 0.6
    top_k: 50
    top_p: 1.0
    repetition_penalty: 1.0

  # length argument for autoregressive sampling
  # max length means max amount of tokens to generate
  length_params:
    max_new_token: null
    max_length: 1024
    min_length: 1

env:
  group_name: "EnvGroup"
  enable_offload: False

  # Override the default values in env/metaworld_50
  train:
    total_num_envs: 16
    specific_reset_id: 20
    auto_reset: False
    use_rel_reward: False
    use_step_penalty: True
    use_ordered_reset_state_ids: False # for specific reset id to work
  eval:
    total_num_envs: 8 #500
    auto_reset: False
    use_rel_reward: False
    use_step_penalty: True
    is_eval: True
    group_size: 1
    specific_reset_id: 20
    use_ordered_reset_state_ids: False
    video_cfg:
      save_video: True

rollout:
  group_name: "RolloutGroup"
  generation_backend: "huggingface"
  recompute_logprobs: False
  unnorm_key: libero_10
  enable_offload: False
  pipeline_stage_num: 1
  collect_transitions: True
  collect_prev_infos: False

  model:
    model_path: "RLinf-Pi0-MetaWorld-SFT"
    precision: ${actor.model.precision}

actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"
  micro_batch_size: 512
  global_batch_size: 512 # maximum : global batch size = micro batch size * actor num_processes.
  seed: 42
  enable_offload: False

  # Override the default values in model/pi0_5
  model:
    model_path: "RLinf-Pi0-MetaWorld-SFT"
    num_action_chunks: 5 # interface for the env, matches action horizon in TrainConfig
    action_dim: 4
    num_steps: 5
    add_value_head: False
    add_q_head: True
    q_head_type: "default"
    # openpi specific parameters
    openpi:
      config_name: "pi0_metaworld"
      num_images_in_input: 1
      value_after_vlm: True
      use_dsrl: True
      dsrl_state_dim: 4
      dsrl_action_noise_dim: 32
      dsrl_num_q_heads: 2 #10
      dsrl_image_latent_dim: 64
      dsrl_state_latent_dim: 64
      dsrl_hidden_dims: [512, 512, 512] #[128, 128, 128]
      train_expert_only: True
      detach_critic_input: True
      noise_method: "reinflow"
      use_action_chunking: True
      action_magnitude: 1.0
      use_state_encoder: True
      use_transformer_critic: False # state encoder has to be true for transformer critic
      use_toperl_critic: True

  optim:
    lr: 1.0e-4
    adam_beta1: 0.9
    adam_beta2: 0.96
    adam_eps: 1.0e-08
    clip_grad: 20.0 #3.5

  critic_optim:
    lr: 3.0e-4
    clip_grad: 40.0 #10.0
    lr_scheduler: torch_constant

  fsdp_config:
    strategy: "fsdp"
    sharding_strategy: "no_shard"
    use_orig_params: True
    gradient_checkpointing: False
    mixed_precision:
      param_dtype: ${actor.model.precision}
      reduce_dtype: ${actor.model.precision}
      buffer_dtype: ${actor.model.precision}
reward:
  use_reward_model: False

critic:
  use_critic_model: False